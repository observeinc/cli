name: sweep

on:
  schedule:
    - cron: "0 7 * * *" # midnight PT
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    concurrency:
      group: integration-sweep
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Codegen
        run: bun run ifneeded:codegen
        env:
          OBSERVE_OPENAPI_SPEC: ${{ secrets.OBSERVE_OPENAPI_SPEC }}
          OBSERVE_GQL_TOKEN: ${{ secrets.OBSERVE_GQL_TOKEN }}
          OBSERVE_GQL_SPEC: ${{ secrets.OBSERVE_GQL_SPEC }}

      - name: Sweep orphaned integration-test resources
        timeout-minutes: 3
        run: bun run test:integration:sweep
        env:
          OBSERVE_INTEGRATION_CUSTOMER: ${{ vars.OBSERVE_INTEGRATION_CUSTOMER }}
          OBSERVE_INTEGRATION_DOMAIN: ${{ vars.OBSERVE_INTEGRATION_DOMAIN }}
          OBSERVE_INTEGRATION_API_TOKEN: ${{ secrets.OBSERVE_INTEGRATION_API_TOKEN }}
