query GetDatasource($id: ObjectId!) {
  datasource(id: $id) {
    id
    name
    type
    datastreamTokenID
    config {
      datasourceFiledropConfig {
        dataAccessPointArn
        destinationUri
        filedrop {
          id
          datastreamTokenID
        }
      }
      awsMetricsPollerConfig {
        poller {
          id
          datastreamTokenId
        }
      }
    }
  }
}
